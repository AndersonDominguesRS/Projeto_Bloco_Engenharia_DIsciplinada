name: Pipeline CI-CD Disciplinado

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      SPRING_DATASOURCE_URL: ${{ secrets.DB_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
      CHROME_HEADLESS: ${{ vars.CHROME_HEADLESS }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Build do Projeto
        run: mvn clean package -DskipTests --file Sprint-RestAPI/pom.xml

      - name: Iniciar Aplicação e Health Check
        run: |
          mvn spring-boot:run --file Sprint-RestAPI/pom.xml &
          echo "Aguardando API..."
          timeout 60s bash -c 'until curl -s localhost:8080/produtos; do echo "Aguardando..."; sleep 5; done'

      - name: Executar Testes Automatizados
        run: mvn test --file Sprint-RestAPI/pom.xml

      - name: Upload de Artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-finais
          path: Sprint-RestAPI/target/surefire-reports/
		  
- name: Gerar Resumo do Job
        if: always()
        run: |
          echo "### resultado da Execucao" >> $GITHUB_STEP_SUMMARY
          echo "| Categoria | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Maven** |  Sucesso |" >> $GITHUB_STEP_SUMMARY
          echo "| **Testes Unitários** | ${{ job.status == 'success' && ' OK' || 'Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Banco de Dados** |  Conectado (${{ secrets.DB_URL }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> [!IMPORTANT]" >> $GITHUB_STEP_SUMMARY
          echo "> Os relatórios detalhados do Selenium e Surefire estão disponíveis nos artefatos abaixo." >> $GITHUB_STEP_SUMMARY

      - name: Debug Log Personalizado
        if: failure()
        run: |
          echo "::error title=Falha no Pipeline::Verifique se o Chrome Headless está ativo e se as credenciais do DB estão corretas."
          echo "::group::Visualizar Logs do Spring"
          cat Sprint-RestAPI/target/spring-boot-logs.txt || echo "Log não encontrado"
          echo "::endgroup::"