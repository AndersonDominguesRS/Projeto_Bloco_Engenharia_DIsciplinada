name: Análise Estática de Código

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Executar análise estática com Maven
        run: mvn verify --file Sprint-RestAPI/pom.xml

      - name: Publicar relatórios
        uses: actions/upload-artifact@v4
        with:
          name: analise-estatica
          path: |
            Tps/TP4/Sprint-RestAPI/target/checkstyle-result.xml
            Tps/TP4/Sprint-RestAPI/target/spotbugsXml.xml
