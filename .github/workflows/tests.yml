name: Testes Automatizados

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Executar testes unitários
        # Exclui o teste de UI para que este job não dependa do servidor rodando
        run: mvn test -Dtest=!ProdutoUITest --file Sprint-RestAPI/pom.xml

      - name: Publicar Relatório de Testes
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes-unitarios
          path: Sprint-RestAPI/target/surefire-reports