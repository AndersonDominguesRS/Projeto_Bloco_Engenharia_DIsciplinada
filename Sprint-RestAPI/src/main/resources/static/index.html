<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 class="mb-4">Cadastro de Produto</h2>

<div id="mensagemErro" class="alert alert-danger" style="display: none;"></div>

<form id="produtoForm" class="row g-3 mb-5">
    <input type="hidden" id="produtoId">
    <div class="col-md-4">
        <input type="text" id="nome" class="form-control" placeholder="Nome do Produto" required>
    </div>
    <div class="col-md-2">
        <input type="number" id="quantidade" class="form-control" placeholder="Qtd" required>
    </div>
    <div class="col-md-2">
        <input type="number" step="0.01" id="preco" class="form-control" placeholder="Preço" required>
    </div>
    <div class="col-md-4">
        <button type="submit" id="btnCadastrar" class="btn btn-primary">Salvar</button>
        <button type="button" onclick="limparForm()" class="btn btn-secondary">Limpar</button>
    </div>
</form>

<h2>Lista de Produtos</h2>
<table class="table table-striped">
    <thead>
    <tr>
        <th>ID</th><th>Nome</th><th>Qtd</th><th>Preço</th><th>Ações</th>
    </tr>
    </thead>
    <tbody id="tabelaCorpo"></tbody>
</table>

<script>
    const API_URL = 'http://localhost:8080/produtos';

    async function listarProdutos() {
        try {
            const resp = await fetch(API_URL);
            const produtos = await resp.json();
            const corpo = document.getElementById('tabelaCorpo');
            corpo.innerHTML = '';
            produtos.forEach(p => {
                corpo.innerHTML += `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.nome}</td>
                        <td>${p.quantidade}</td>
                        <td>R$ ${parseFloat(p.preco).toFixed(2)}</td>
                        <td>
                            <button onclick="editar(${p.id}, '${p.nome}', ${p.quantidade}, ${p.preco})" class="btn btn-sm btn-warning">Editar</button>
                            <button onclick="excluir(${p.id})" class="btn btn-sm btn-danger">Excluir</button>
                        </td>
                    </tr>`;
            });
        } catch (error) {
            console.error("Erro ao listar produtos:", error);
        }
    }

    document.getElementById('produtoForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const msgDiv = document.getElementById('mensagemErro');
        msgDiv.style.display = 'none';

        const id = document.getElementById('produtoId').value;
        const produto = {
            nome: document.getElementById('nome').value,
            quantidade: parseInt(document.getElementById('quantidade').value),
            preco: parseFloat(document.getElementById('preco').value)
        };

        const metodo = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;

        try {
            const response = await fetch(url, {
                method: metodo,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(produto)
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.erro || "Erro ao salvar o produto.");
            }

            limparForm();
            listarProdutos();

        } catch (error) {
            msgDiv.innerText = error.message;
            msgDiv.style.display = 'block';
        }
    });

    async function excluir(id) {
        if(confirm('Deseja excluir este produto?')) {
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error("Erro ao excluir produto.");
                listarProdutos();
            } catch (error) {
                alert(error.message);
            }
        }
    }

    function editar(id, nome, qtd, preco) {
        document.getElementById('produtoId').value = id;
        document.getElementById('nome').value = nome;
        document.getElementById('quantidade').value = qtd;
        document.getElementById('preco').value = preco;
        document.getElementById('mensagemErro').style.display = 'none';
    }

    function limparForm() {
        document.getElementById('produtoForm').reset();
        document.getElementById('produtoId').value = '';
        document.getElementById('mensagemErro').style.display = 'none';
    }

    listarProdutos();
</script>
</body>
</html>
